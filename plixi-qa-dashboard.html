<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plixi QA Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --primary: #6C3FC5;
    --primary-light: #8B5CF6;
    --primary-dark: #4C2D9C;
    --accent: #10B981;
    --danger: #EF4444;
    --warning: #F59E0B;
    --bg: #0F0F1A;
    --bg2: #1A1A2E;
    --bg3: #252540;
    --card: #1E1E35;
    --border: #2E2E50;
    --text: #E8E8F0;
    --text-muted: #8888AA;
    --pass: #10B981;
    --fail: #EF4444;
    --target-line: 85;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); padding: 18px 28px; display: flex; align-items: center; gap: 14px; box-shadow: 0 4px 20px rgba(108,63,197,0.4); }
  .header-logo { width: 38px; height: 38px; background: rgba(255,255,255,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
  .header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .refresh-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
  .refresh-btn:hover { background: rgba(255,255,255,0.25); }
  .last-updated { font-size: 11px; opacity: 0.65; }

  /* Filters */
  .filters-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-group select, .filter-group input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; min-width: 130px; }
  .filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--primary-light); }
  .filter-divider { width: 1px; background: var(--border); height: 40px; align-self: flex-end; }
  .filter-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .apply-btn { background: var(--primary); border: none; color: #fff; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; height: 36px; transition: background 0.2s; }
  .apply-btn:hover { background: var(--primary-light); }

  /* Tabs */
  .tabs { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; gap: 4px; }
  .tab-btn { padding: 14px 22px; background: none; border: none; color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--primary-light); border-bottom-color: var(--primary-light); }

  /* Main content */
  .content { padding: 24px 28px; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Cards grid */
  .cards-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
  .card-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .card-value { font-size: 36px; font-weight: 800; line-height: 1; }
  .card-value.pass { color: var(--pass); }
  .card-value.fail { color: var(--fail); }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .card-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 40px; opacity: 0.12; }

  /* Top agents card */
  .top-agents-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; overflow: hidden; }
  .top-agents-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--warning), #FCD34D); }
  .top-agents-card .card-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }
  .top-agent-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .top-agent-item:last-child { border-bottom: none; }
  .top-agent-rank { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .rank-1 { background: #F59E0B; color: #000; }
  .rank-2 { background: #9CA3AF; color: #000; }
  .rank-3 { background: #CD7C2F; color: #fff; }
  .top-agent-name { flex: 1; font-size: 13px; font-weight: 500; }
  .top-agent-score { font-size: 15px; font-weight: 700; }
  .score-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .score-badge.pass { background: rgba(16,185,129,0.15); color: var(--pass); }
  .score-badge.fail { background: rgba(239,68,68,0.15); color: var(--fail); }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .chart-card h3 span { font-size: 11px; color: var(--text-muted); font-weight: 400; }
  .chart-container { position: relative; height: 220px; }

  /* Tables */
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
  .table-card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-card-header h3 { font-size: 14px; font-weight: 600; }
  .table-card-header p { font-size: 12px; color: var(--text-muted); }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(108,63,197,0.05); }
  .rank-col { font-weight: 700; color: var(--text-muted); }
  .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
  .status-pill.on-target { background: rgba(16,185,129,0.15); color: var(--pass); }
  .status-pill.below-target { background: rgba(239,68,68,0.15); color: var(--fail); }

  /* Markdown bar in table */
  .bar-cell { display: flex; align-items: center; gap: 8px; }
  .mini-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; max-width: 120px; }
  .mini-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--danger), #F97316); }
  .error-count { font-weight: 700; color: var(--danger); font-size: 14px; min-width: 24px; }

  /* Agent Scores Tab */
  .agent-section { margin-bottom: 28px; }
  .agent-section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .agent-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-light)); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .agent-name { font-size: 18px; font-weight: 700; }
  .agent-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .agent-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .agent-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .agent-card-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .agent-card-value { font-size: 28px; font-weight: 800; }
  .agent-card-value.pass { color: var(--pass); }
  .agent-card-value.fail { color: var(--fail); }
  .agent-charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .markdown-drivers { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .markdown-drivers h4 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .driver-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .driver-label { width: 200px; flex-shrink: 0; }
  .driver-bar { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .driver-fill { height: 100%; border-radius: 4px; }
  .driver-count { font-weight: 700; color: var(--danger); width: 24px; text-align: right; flex-shrink: 0; }
  .top-markdown-section { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .top-markdown-section h4 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .feedback-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .feedback-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .feedback-tag { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(108,63,197,0.2); color: var(--primary-light); }
  .feedback-link { font-size: 11px; color: var(--primary-light); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .feedback-link:hover { text-decoration: underline; }
  .feedback-link::before { content: '🔗'; font-size: 10px; }
  .feedback-text { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* Loading state */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--text-muted); font-size: 14px; }

  /* Error state */
  .error-state { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 20px; text-align: center; margin: 20px 0; }
  .error-state h3 { color: var(--fail); margin-bottom: 8px; }
  .error-state p { color: var(--text-muted); font-size: 13px; }

  /* No data */
  .no-data { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

  /* Scrollable table wrapper */
  .table-scroll { overflow-x: auto; }

  /* Score color based on value */
  .score-value { font-weight: 700; }

  /* Agent divider */
  .agent-divider { border: none; border-top: 2px solid var(--border); margin: 28px 0; }

  /* Empty agent notice */
  .select-agent-notice { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .select-agent-notice .icon { font-size: 48px; margin-bottom: 12px; }
  .select-agent-notice p { font-size: 15px; }

  @media (max-width: 768px) {
    .charts-row { grid-template-columns: 1fr; }
    .agent-cards { grid-template-columns: 1fr 1fr; }
    .agent-charts-row { grid-template-columns: 1fr; }
    .filters-bar { padding: 12px 16px; }
    .content { padding: 16px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">📊</div>
  <div>
    <div class="header h1" style="font-size:22px;font-weight:700;">Plixi QA Dashboard</div>
    <div class="header-sub">Quality Assurance Performance Tracker</div>
  </div>
  <div class="header-right">
    <div class="last-updated" id="lastUpdated"></div>
    <button class="refresh-btn" onclick="loadData()">⟳ Refresh</button>
  </div>
</div>

<!-- Filters -->
<div class="filters-bar">
  <div class="filter-row">
    <div class="filter-group">
      <label>From (Month &amp; Year)</label>
      <select id="filterMonthFrom">
        <option value="">All</option>
      </select>
    </div>
    <div class="filter-group">
      <label>To (Month &amp; Year)</label>
      <select id="filterMonthTo">
        <option value="">All</option>
      </select>
    </div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-row">
    <div class="filter-group">
      <label>Agent</label>
      <select id="filterAgent">
        <option value="">All Agents</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Audit Type</label>
      <select id="filterAuditType">
        <option value="">All Types</option>
        <option value="QA">QA</option>
        <option value="Focused QA">Focused QA</option>
        <option value="Calibration">Calibration</option>
        <option value="Certification">Certification</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Channel</label>
      <select id="filterChannel">
        <option value="">All Channels</option>
        <option value="Email">Email</option>
        <option value="Chat">Chat</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Gladly Topic</label>
      <select id="filterTopic">
        <option value="">All Topics</option>
        <option value="Account">Account</option>
        <option value="Billing">Billing</option>
        <option value="Cancellation">Cancellation</option>
        <option value="Service">Service</option>
      </select>
    </div>
  </div>
  <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overview', this)">📈 Overview</button>
  <button class="tab-btn" onclick="switchTab('agent', this)">👤 Agent Scores</button>
</div>

<!-- Content -->
<div class="content">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading QA data from Google Sheets...</p>
  </div>

  <!-- Overview Tab -->
  <div id="tab-overview" class="tab-pane" style="display:none;">
    <div class="cards-row" id="overviewCards"></div>
    <div class="charts-row">
      <div class="chart-card">
        <h3>QA Score Trend <span id="trendLabel"></span></h3>
        <div class="chart-container"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Top 5 Markdown Parameters</h3>
        <div class="chart-container"><canvas id="markdownChart"></canvas></div>
      </div>
    </div>
    <div class="table-card">
      <div class="table-card-header">
        <h3>Agent Ranking</h3>
        <p>Pass threshold: 85% | Ranked by QA average</p>
      </div>
      <div class="table-scroll">
        <table id="rankingTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Agent Name</th>
              <th>QA Average</th>
              <th>Total Audits</th>
              <th>QA Target</th>
            </tr>
          </thead>
          <tbody id="rankingBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Agent Scores Tab -->
  <div id="tab-agent" class="tab-pane" style="display:none;">
    <div id="agentContent"></div>
  </div>
</div>

<script>
const SHEET_ID = '1lmT9iMLT09UanYeud_CmPVMe_kVQcPVD4P1KA7KJN10';
const SHEET_GID = '112732509';
const PASSING_SCORE = 85;

// Column indices (0-based in gviz)
const COL = {
  TIMESTAMP: 0,
  AGENT: 1,
  LINK: 2,
  AUDITOR: 3,
  SCORE: 4,
  REMARKS: 5,
  SS_ACK: 6,   // Acknowledgment /3
  SS_EMP: 7,   // Empathy /2
  SS_REA: 8,   // Reassurance /2
  PC_TOP: 9,   // Topic Application /3
  PC_ACC: 10,  // Account Review /5
  PC_SOP: 11,  // SOP Adherence /5
  PC_ESC: 12,  // Escalation /4
  PC_BV: 13,   // Brand Voice /5
  PC_TRK: 14,  // Tracker /4
  PC_NTS: 15,  // Notes /2
  TOPIC: 16,
  AUDIT_TYPE: 17,
  CHANNEL: 18,
  UPSELL: 19,
  ZTP: 20,
  ZTP_SS: 21,
  EMAIL: 22,
  COMPANY: 23,
  AVG_SCORE: 24,
  MONTH: 25
};

const PARAM_LABELS = {
  SS_ACK: 'Acknowledgment & Understanding',
  SS_EMP: 'Empathy',
  SS_REA: 'Reassurance',
  PC_TOP: 'Topic Application',
  PC_ACC: 'Account Review',
  PC_SOP: 'SOP Adherence',
  PC_ESC: 'Escalation & Task Creation',
  PC_BV: 'Brand Voice + Signature',
  PC_TRK: 'Tracker Updates',
  PC_NTS: 'Notes Recorded'
};

// Soft skills params
const SS_PARAMS = ['SS_ACK', 'SS_EMP', 'SS_REA'];
// SOP/Policy params
const SOP_PARAMS = ['PC_TOP', 'PC_ACC', 'PC_SOP', 'PC_ESC', 'PC_BV', 'PC_TRK', 'PC_NTS'];
const ALL_PARAMS = [...SS_PARAMS, ...SOP_PARAMS];

const MONTH_ORDER = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let rawData = [];
let filteredData = [];
let charts = {};
let currentTab = 'overview';

// ─── Data Loading ────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('tab-overview').style.display = 'none';
  document.getElementById('tab-agent').style.display = 'none';

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    // gviz wraps JSON in a callback: google.visualization.Query.setResponse({...});
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/)[1]);
    const table = json.table;
    rawData = parseGvizTable(table);
    populateFilters();
    applyFilters();
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('loading').innerHTML = `
      <div class="error-state">
        <h3>⚠ Unable to load data</h3>
        <p>Make sure the Google Sheet is shared publicly (Anyone with link can view).<br>Error: ${e.message}</p>
      </div>`;
    console.error(e);
  }
}

function parseGvizTable(table) {
  const rows = [];
  for (const row of table.rows) {
    if (!row.c) continue;
    const get = (i) => {
      const cell = row.c[i];
      if (!cell) return null;
      if (cell.v === null || cell.v === undefined) return cell.f || null;
      return cell.v;
    };
    const getString = (i) => {
      const cell = row.c[i];
      if (!cell) return '';
      if (cell.f) return cell.f.trim();
      if (cell.v !== null && cell.v !== undefined) return String(cell.v).trim();
      return '';
    };
    const getNum = (i) => {
      const v = get(i);
      if (v === null) return null;
      const n = parseFloat(v);
      return isNaN(n) ? null : n;
    };

    // Parse date from gviz Date object string or formatted value
    let timestamp = null;
    const tsCell = row.c[COL.TIMESTAMP];
    if (tsCell) {
      if (tsCell.f) {
        // formatted like "5/9/2025"
        const parts = tsCell.f.split('/');
        if (parts.length === 3) {
          timestamp = new Date(parseInt(parts[2]), parseInt(parts[0])-1, parseInt(parts[1]));
        }
      } else if (typeof tsCell.v === 'string' && tsCell.v.startsWith('Date(')) {
        // "Date(2025,4,9)"
        const m = tsCell.v.match(/Date\((\d+),(\d+),(\d+)\)/);
        if (m) timestamp = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
      }
    }

    const company = getString(COL.COMPANY);
    if (company !== 'Plixi') continue;

    const agent = getString(COL.AGENT);
    if (!agent || agent === 'Agent Name') continue;

    const score = getNum(COL.SCORE);
    if (score === null) continue;

    const month = getString(COL.MONTH);
    const auditType = getString(COL.AUDIT_TYPE);
    const channel = getString(COL.CHANNEL);
    const topic = getString(COL.TOPIC);
    const link = getString(COL.LINK);
    const remarks = getString(COL.REMARKS);

    // Get Yes/No/NA for each param
    const paramVals = {};
    for (const key of ALL_PARAMS) {
      paramVals[key] = getString(COL[key]).toLowerCase();
    }

    // Compute soft skills score
    const ssKeys = SS_PARAMS;
    let ssPass = 0, ssTotal = 0;
    for (const k of ssKeys) {
      const v = paramVals[k];
      if (v === 'yes') { ssPass++; ssTotal++; }
      else if (v === 'no') { ssTotal++; }
      // NA doesn't count
    }
    const ssScore = ssTotal > 0 ? (ssPass / ssTotal * 100) : null;

    // Compute SOP score
    const sopKeys = SOP_PARAMS;
    let sopPass = 0, sopTotal = 0;
    for (const k of sopKeys) {
      const v = paramVals[k];
      if (v === 'yes') { sopPass++; sopTotal++; }
      else if (v === 'no') { sopTotal++; }
    }
    const sopScore = sopTotal > 0 ? (sopPass / sopTotal * 100) : null;

    rows.push({ timestamp, agent, link, score, remarks, month, auditType, channel, topic, paramVals, ssScore, sopScore });
  }
  return rows;
}

// ─── Filters ─────────────────────────────────────────────────────────────────
function populateFilters() {
  // Build Month+Year keys from timestamps (e.g. "2025-05" → "May 2025")
  const monthYearSet = new Set();
  for (const r of rawData) {
    if (r.timestamp) {
      const key = `${r.timestamp.getFullYear()}-${String(r.timestamp.getMonth()+1).padStart(2,'0')}`;
      monthYearSet.add(key);
    }
  }
  const monthYearKeys = [...monthYearSet].sort(); // sorts as "2025-05", "2025-06" etc.

  const fromSel = document.getElementById('filterMonthFrom');
  const toSel = document.getElementById('filterMonthTo');
  fromSel.innerHTML = '<option value="">All</option>';
  toSel.innerHTML = '<option value="">All</option>';
  monthYearKeys.forEach(key => {
    const [yr, mo] = key.split('-');
    const label = `${MONTH_ORDER[parseInt(mo)-1]} ${yr}`;
    fromSel.innerHTML += `<option value="${key}">${label}</option>`;
    toSel.innerHTML += `<option value="${key}">${label}</option>`;
  });

  // Agents
  const agents = [...new Set(rawData.map(r => r.agent))].sort();
  const agentSel = document.getElementById('filterAgent');
  agentSel.innerHTML = '<option value="">All Agents</option>';
  agents.forEach(a => { agentSel.innerHTML += `<option value="${a}">${a}</option>`; });
}

function applyFilters() {
  const monthFrom = document.getElementById('filterMonthFrom').value;
  const monthTo = document.getElementById('filterMonthTo').value;
  const agent = document.getElementById('filterAgent').value;
  const auditType = document.getElementById('filterAuditType').value;
  const channel = document.getElementById('filterChannel').value;
  const topic = document.getElementById('filterTopic').value;

  filteredData = rawData.filter(r => {
    if (monthFrom || monthTo) {
      if (!r.timestamp) return false;
      const key = `${r.timestamp.getFullYear()}-${String(r.timestamp.getMonth()+1).padStart(2,'0')}`;
      if (monthFrom && key < monthFrom) return false;
      if (monthTo && key > monthTo) return false;
    }
    if (agent && r.agent !== agent) return false;
    if (auditType && r.auditType !== auditType) return false;
    if (channel && r.channel !== channel) return false;
    if (topic && r.topic !== topic) return false;
    return true;
  });

  renderDashboard();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderDashboard() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('tab-overview').style.display = 'block';
  document.getElementById('tab-agent').style.display = 'block';
  if (currentTab === 'overview') {
    document.getElementById('tab-overview').classList.add('active');
    document.getElementById('tab-agent').classList.remove('active');
  } else {
    document.getElementById('tab-agent').classList.add('active');
    document.getElementById('tab-overview').classList.remove('active');
  }
  // Re-trigger display
  document.getElementById(`tab-${currentTab}`).style.display = 'block';
  document.getElementById(`tab-${currentTab === 'overview' ? 'agent' : 'overview'}`).style.display = 'none';

  renderOverview();
  renderAgentScores();
}

function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function scoreColor(v) { return v >= PASSING_SCORE ? 'var(--pass)' : 'var(--fail)'; }
function scoreClass(v) { return v >= PASSING_SCORE ? 'pass' : 'fail'; }

// ─── Overview ─────────────────────────────────────────────────────────────────
function renderOverview() {
  const data = filteredData;
  const scores = data.map(r => r.score);
  const teamAvg = avg(scores);
  const agents = [...new Set(data.map(r => r.agent))];
  const totalAudited = agents.length;

  // Agent averages
  const agentMap = {};
  for (const r of data) {
    if (!agentMap[r.agent]) agentMap[r.agent] = [];
    agentMap[r.agent].push(r.score);
  }
  const agentAvgs = Object.entries(agentMap).map(([name, arr]) => ({ name, avg: avg(arr), count: arr.length })).sort((a,b) => b.avg - a.avg);

  // Overview cards
  const top3 = agentAvgs.slice(0, 3);
  const ranks = ['rank-1','rank-2','rank-3'];
  const medals = ['1st','2nd','3rd'];
  let top3Html = '';
  top3.forEach((a, i) => {
    const cls = a.avg >= PASSING_SCORE ? 'pass' : 'fail';
    top3Html += `
      <div class="top-agent-item">
        <div class="top-agent-rank ${ranks[i]}">${medals[i]}</div>
        <div class="top-agent-name">${a.name}</div>
        <span class="score-badge ${cls}">${a.avg.toFixed(1)}%</span>
      </div>`;
  });

  document.getElementById('overviewCards').innerHTML = `
    <div class="card">
      <div class="card-icon">📊</div>
      <div class="card-label">Team QA Average</div>
      <div class="card-value ${scoreClass(teamAvg)}">${teamAvg.toFixed(1)}<small style="font-size:18px">%</small></div>
      <div class="card-sub">Based on ${scores.length} audit${scores.length!==1?'s':''}</div>
    </div>
    <div class="card">
      <div class="card-icon">👥</div>
      <div class="card-label">Agents Audited</div>
      <div class="card-value" style="color:var(--primary-light)">${totalAudited}</div>
      <div class="card-sub">${scores.length} total audits in range</div>
    </div>
    <div class="top-agents-card" style="min-width:260px">
      <div class="card-label">🏆 Top 3 Agents</div>
      ${top3Html || '<p style="color:var(--text-muted);font-size:13px;">No data</p>'}
    </div>`;

  // Trend chart
  renderTrendChart(data);

  // Markdown chart
  renderMarkdownChart(data);

  // Ranking table
  const tbody = document.getElementById('rankingBody');
  tbody.innerHTML = agentAvgs.map((a, i) => `
    <tr>
      <td class="rank-col">${i+1}</td>
      <td style="font-weight:600">${a.name}</td>
      <td><span style="font-weight:700;color:${scoreColor(a.avg)}">${a.avg.toFixed(1)}%</span></td>
      <td>${a.count}</td>
      <td><span class="status-pill ${a.avg >= PASSING_SCORE ? 'on-target' : 'below-target'}">${a.avg >= PASSING_SCORE ? '✓ On Target' : '✗ Below Target'}</span></td>
    </tr>`).join('');
}

function renderTrendChart(data) {
  // Group by Month Year (e.g. "May 2025")
  const monthGroups = {};
  for (const r of data) {
    let key = 'Unknown';
    if (r.timestamp) {
      const yr = r.timestamp.getFullYear();
      const mo = r.timestamp.getMonth();
      key = `${MONTH_ORDER[mo]} ${yr}`;
    } else if (r.month) {
      key = r.month;
    }
    if (!monthGroups[key]) monthGroups[key] = [];
    monthGroups[key].push(r.score);
  }
  // Sort by date
  const labels = Object.keys(monthGroups).sort((a,b) => {
    const parse = s => { const p = s.split(' '); return parseInt(p[1])*100 + MONTH_ORDER.indexOf(p[0]); };
    return parse(a) - parse(b);
  });
  const values = labels.map(m => avg(monthGroups[m]));

  document.getElementById('trendLabel').textContent = '— Monthly';

  if (charts.trend) charts.trend.destroy();
  charts.trend = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Team QA Avg',
        data: values,
        borderColor: '#8B5CF6',
        backgroundColor: 'rgba(139,92,246,0.15)',
        borderWidth: 2.5,
        pointBackgroundColor: values.map(v => v >= PASSING_SCORE ? '#10B981' : '#EF4444'),
        pointRadius: 5,
        tension: 0.3,
        fill: true
      }, {
        label: '85% Target',
        data: labels.map(() => 85),
        borderColor: '#F59E0B',
        borderWidth: 1.5,
        borderDash: [6,4],
        pointRadius: 0,
        fill: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8888AA', font: {size:11} } } },
      scales: {
        x: { ticks: { color: '#8888AA' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { min: 0, max: 100, ticks: { color: '#8888AA', callback: v => v+'%' }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

function renderMarkdownChart(data) {
  const errorCounts = {};
  for (const key of ALL_PARAMS) errorCounts[key] = 0;
  for (const r of data) {
    for (const key of ALL_PARAMS) {
      if (r.paramVals[key] === 'no') errorCounts[key]++;
    }
  }
  const sorted = Object.entries(errorCounts).sort((a,b) => b[1]-a[1]).slice(0,5);
  const labels = sorted.map(([k]) => PARAM_LABELS[k]);
  const values = sorted.map(([,v]) => v);

  if (charts.markdown) charts.markdown.destroy();
  charts.markdown = new Chart(document.getElementById('markdownChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Errors',
        data: values,
        backgroundColor: ['rgba(239,68,68,0.8)','rgba(249,115,22,0.8)','rgba(245,158,11,0.8)','rgba(139,92,246,0.7)','rgba(59,130,246,0.7)'],
        borderRadius: 6
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8888AA' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#E8E8F0', font: {size:10} }, grid: { display: false } }
      }
    }
  });
}

// ─── Agent Scores Tab ─────────────────────────────────────────────────────────
function renderAgentScores() {
  const agentFilter = document.getElementById('filterAgent').value;
  const container = document.getElementById('agentContent');

  const agents = agentFilter
    ? [agentFilter]
    : [...new Set(filteredData.map(r => r.agent))].sort();

  if (agents.length === 0) {
    container.innerHTML = '<div class="no-data">No data available for selected filters.</div>';
    return;
  }

  // Destroy old agent charts
  Object.keys(charts).filter(k => k.startsWith('agent_')).forEach(k => { charts[k].destroy(); delete charts[k]; });

  let html = '';
  for (let i = 0; i < agents.length; i++) {
    const name = agents[i];
    const agentData = filteredData.filter(r => r.agent === name);
    if (agentData.length === 0) continue;
    html += buildAgentSection(name, agentData, i);
    if (i < agents.length - 1) html += '<hr class="agent-divider">';
  }
  container.innerHTML = html;

  // Now render charts for each agent
  for (let i = 0; i < agents.length; i++) {
    const name = agents[i];
    const agentData = filteredData.filter(r => r.agent === name);
    if (agentData.length === 0) continue;
    renderAgentMarkdownChart(name, agentData, i);
    renderAgentTrendChart(name, agentData, i);
  }
}

function buildAgentSection(name, data, idx) {
  const scores = data.map(r => r.score);
  const qaAvg = avg(scores);

  // SS and SOP averages
  const ssScores = data.map(r => r.ssScore).filter(v => v !== null);
  const sopScores = data.map(r => r.sopScore).filter(v => v !== null);
  const ssAvg = ssScores.length ? avg(ssScores) : null;
  const sopAvg = sopScores.length ? avg(sopScores) : null;

  // Top markdown driver
  const errorCounts = {};
  for (const key of ALL_PARAMS) errorCounts[key] = 0;
  for (const r of data) {
    for (const key of ALL_PARAMS) {
      if (r.paramVals[key] === 'no') errorCounts[key]++;
    }
  }
  const topMarkdownKey = Object.entries(errorCounts).sort((a,b) => b[1]-a[1])[0];
  const topDriver = topMarkdownKey && topMarkdownKey[1] > 0 ? topMarkdownKey[0] : null;

  // Feedback items with errors in the top driver
  const feedbackItems = topDriver
    ? data.filter(r => r.paramVals[topDriver] === 'no').slice(0, 3)
    : [];

  const initials = name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();

  let feedbackHtml = '';
  if (feedbackItems.length > 0) {
    feedbackHtml = feedbackItems.map(r => `
      <div class="feedback-item">
        <div class="feedback-meta">
          <span class="feedback-tag">${r.month || 'N/A'}</span>
          <span class="feedback-tag" style="background:rgba(239,68,68,0.15);color:#EF4444;">${r.auditType || ''}</span>
          <span class="feedback-tag" style="background:rgba(16,185,129,0.1);color:#10B981;">${r.channel || ''}</span>
          <span class="feedback-tag" style="background:rgba(245,158,11,0.15);color:#F59E0B;">${r.topic || ''}</span>
          <span style="font-weight:700;color:${scoreColor(r.score)};font-size:12px;">Score: ${r.score.toFixed(1)}%</span>
          ${r.link ? `<a class="feedback-link" href="${r.link}" target="_blank">View Conversation</a>` : ''}
        </div>
        <div class="feedback-text">${r.remarks ? r.remarks.slice(0, 300) + (r.remarks.length > 300 ? '...' : '') : 'No remarks recorded.'}</div>
      </div>`).join('');
  } else {
    feedbackHtml = '<p style="color:var(--text-muted);font-size:13px;">No markdown errors in top driver for selected filters.</p>';
  }

  return `
    <div class="agent-section" data-agent-idx="${idx}">
      <div class="agent-section-header">
        <div class="agent-avatar">${initials}</div>
        <div>
          <div class="agent-name">${name}</div>
          <div class="agent-meta">${data.length} audit${data.length!==1?'s':''} · Status: <span style="color:${scoreColor(qaAvg)};font-weight:600;">${qaAvg >= PASSING_SCORE ? 'On Target' : 'Below Target'}</span></div>
        </div>
      </div>

      <div class="agent-cards">
        <div class="agent-card">
          <div class="agent-card-label">QA Average</div>
          <div class="agent-card-value ${scoreClass(qaAvg)}">${qaAvg.toFixed(1)}<small style="font-size:14px">%</small></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Target: 85%</div>
        </div>
        <div class="agent-card">
          <div class="agent-card-label">Soft Skills Score</div>
          <div class="agent-card-value ${ssAvg !== null ? scoreClass(ssAvg) : ''}">${ssAvg !== null ? ssAvg.toFixed(1)+'<small style="font-size:14px">%</small>' : '—'}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Ack · Empathy · Reassurance</div>
        </div>
        <div class="agent-card">
          <div class="agent-card-label">SOP Score</div>
          <div class="agent-card-value ${sopAvg !== null ? scoreClass(sopAvg) : ''}">${sopAvg !== null ? sopAvg.toFixed(1)+'<small style="font-size:14px">%</small>' : '—'}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Policy Compliance</div>
        </div>
      </div>

      <div class="agent-charts-row">
        <div class="chart-card">
          <h3>QA Score Trend</h3>
          <div class="chart-container"><canvas id="agentTrend_${idx}"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>Markdown Drivers</h3>
          <div class="chart-container"><canvas id="agentMarkdown_${idx}"></canvas></div>
        </div>
      </div>

      <div class="top-markdown-section">
        <h4>🔴 Top Markdown Driver: ${topDriver ? PARAM_LABELS[topDriver] : 'None'} ${topDriver && errorCounts[topDriver] > 0 ? '('+errorCounts[topDriver]+' error'+( errorCounts[topDriver]>1?'s':'')+')' : ''}</h4>
        ${feedbackHtml}
      </div>
    </div>`;
}

function renderAgentMarkdownChart(name, data, idx) {
  const errorCounts = {};
  for (const key of ALL_PARAMS) errorCounts[key] = 0;
  for (const r of data) {
    for (const key of ALL_PARAMS) {
      if (r.paramVals[key] === 'no') errorCounts[key]++;
    }
  }
  const sorted = Object.entries(errorCounts).filter(([,v])=>v>0).sort((a,b) => b[1]-a[1]);
  const labels = sorted.map(([k]) => PARAM_LABELS[k]);
  const values = sorted.map(([,v]) => v);

  const canvasId = `agentMarkdown_${idx}`;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  if (values.length === 0) {
    canvas.parentElement.innerHTML = '<div class="no-data" style="padding:20px;font-size:13px;">No markdown errors 🎉</div>';
    return;
  }

  if (charts[`agent_md_${idx}`]) charts[`agent_md_${idx}`].destroy();
  charts[`agent_md_${idx}`] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Errors', data: values, backgroundColor: 'rgba(239,68,68,0.8)', borderRadius: 5 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8888AA', stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#E8E8F0', font: {size:10} }, grid: { display: false } }
      }
    }
  });
}

function renderAgentTrendChart(name, data, idx) {
  const monthGroups = {};
  for (const r of data) {
    let key = 'Unknown';
    if (r.timestamp) {
      const yr = r.timestamp.getFullYear();
      const mo = r.timestamp.getMonth();
      key = `${MONTH_ORDER[mo]} ${yr}`;
    } else if (r.month) {
      key = r.month;
    }
    if (!monthGroups[key]) monthGroups[key] = [];
    monthGroups[key].push(r.score);
  }
  const labels = Object.keys(monthGroups).sort((a,b) => {
    const parse = s => { const p = s.split(' '); return parseInt(p[1])*100 + MONTH_ORDER.indexOf(p[0]); };
    return parse(a) - parse(b);
  });
  const values = labels.map(m => avg(monthGroups[m]));

  const canvasId = `agentTrend_${idx}`;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  if (charts[`agent_tr_${idx}`]) charts[`agent_tr_${idx}`].destroy();
  charts[`agent_tr_${idx}`] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'QA Avg',
        data: values,
        borderColor: '#8B5CF6',
        backgroundColor: 'rgba(139,92,246,0.15)',
        borderWidth: 2,
        pointBackgroundColor: values.map(v => v >= PASSING_SCORE ? '#10B981' : '#EF4444'),
        pointRadius: 5,
        tension: 0.3,
        fill: true
      }, {
        label: '85% Target',
        data: labels.map(() => 85),
        borderColor: '#F59E0B',
        borderWidth: 1.5,
        borderDash: [6,4],
        pointRadius: 0,
        fill: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8888AA', font:{size:10} } } },
      scales: {
        x: { ticks: { color: '#8888AA' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { min: 0, max: 100, ticks: { color: '#8888AA', callback: v => v+'%' }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p => { p.style.display='none'; p.classList.remove('active'); });
  document.getElementById(`tab-${tab}`).style.display = 'block';
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
